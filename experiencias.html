<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="main-header">
        <h1 class="TituloMain">Experiencias Profesionales</h1>
        <br>
        <div class="nav-row">
            <nav class="nav-menu">
                <a href="index.html">Inicio</a>
                <a href="estudios.html">Estudios</a>
                <a href="perfil.html">Perfil</a>
                <a href="experiencias.html" class="active">Experiencias</a>
                <a href="Contacto.html">Contacto</a>
            </nav>

            <div class="social-container">
                <a href="https://www.linkedin.com/in/label-andocilla-9a3430364/" target="_blank" class="social-link">
                    <img src="linkedIn.png" alt="LinkedIn" class="social-icon">
                    <span>LinkedIn</span>
                </a>
                <a href="https://github.com/YuanShikai-1913" target="_blank" class="social-link">
                    <img src="github.png" alt="GitHub" class="social-icon">
                    <span>GitHub</span>
                </a>
            </div>
        </div>
    </header>
    <br>

    <div class="descripciones" id="contenedor-experiencias">
        <div class="textoPerfil">
            <h2>Cargando experiencias...</h2>
        </div>
    </div>

    <br>
    <footer>
        <p>© FromSoftware Company - 2026 - CV Alejandro Andocilla Tapia</p>
    </footer>
    <br>
    <br>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const contenedor = document.getElementById('contenedor-experiencias');

        fetch('http://localhost:3000/api/experiencias')
            .then(response => response.json())
            .then(experiencias => {

                if (experiencias.length === 0) {
                    contenedor.innerHTML = `
                        <div class="textoPerfil">
                            <h2>No hay experiencias registradas aún.</h2>
                        </div>`;
                    return;
                }

                let html = `<div class="textoPerfil"><h2>Experiencias</h2></div>
                            <div class="listas"><ul style="list-style-type: disc;">`;

                experiencias.forEach(exp => {
                    html += `
                        <li>
                            <strong>${exp.cargo}</strong> — ${exp.empresa}<br>
                            <span style="color:#888; font-size:0.95rem;">
                                ${exp.fechaInicio} → ${exp.fechaFin}
                            </span><br>
                            ${exp.descripcion}<br>
                            <span style="color: crimson;">
                                ${exp.tecnologias.join(' • ')}
                            </span>
                        </li><br>
                    `;
                });

                html += `</ul></div>`;
                contenedor.innerHTML = html;
            })
            .catch(error => {
                contenedor.innerHTML = `
                    <div class="textoPerfil">
                        <h2 style="color:crimson;">
                            ⚠️ No se pudo conectar con la API. 
                            Asegúrate de que el servidor esté corriendo.
                        </h2>
                    </div>`;
            });
    </script>

</body>
</html>
