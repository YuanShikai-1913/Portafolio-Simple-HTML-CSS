<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="main-header">
        <h1 class="TituloMain">Contacto</h1>
        <br>
        <div class="nav-row">
            <nav class="nav-menu">
                <a href="index.html">Inicio</a>
                <a href="estudios.html">Estudios</a>
                <a href="perfil.html">Perfil</a>
                <a href="Contacto.html" class="active">Contacto</a>
            </nav>

            <div class="social-container">
                <a href="https://www.linkedin.com/in/label-andocilla-9a3430364/" target="_blank" class="social-link">
                    <img src="linkedIn.png" alt="LinkedIn" class="social-icon">
                    <span>LinkedIn</span>
                </a>

                <a href="https://github.com/YuanShikai-1913" target="_blank" class="social-link">
                    <img src="github.png" alt="GitHub" class="social-icon">
                    <span>GitHub</span>
                </a>
            </div>
        </div>
    </header>
    <br>
    <div class="container mt-5">
    <div class="card p-4 descripciones">
        <div class="titulocontacto">
            <h2>¿Desea trabajar conmigo?; ¡envíeme un mensaje!</h2>
        </div>
        <form class="contact-form">

            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ingrese su nombre">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Ingrese su correo">
            </div>

            <div class="mb-3">
                <label for="mensaje" class="form-label">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" class="form-control"
                    placeholder="Escriba su mensaje aquí..."></textarea>
            </div>

            <div id="mensajeEstado" class="mt-3"></div>

            <button type="submit" class="btn btn-primary w-100">Enviar</button>


        </form>
      </div>
    </div>
    <br>
    <footer>
        <p> © FromSoftware Company - 2026 - CV Alejandro Andocilla Tapia</p>
    </footer>
    <br>
    <br>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

   <script>
$(document).ready(function(){

    // Animación
    $(".contact-form").hide().fadeIn(1000);

    $(".contact-form").submit(function(e){
        e.preventDefault();

        let nombre = $("#nombre").val().trim();
        let email = $("#email").val().trim();
        let mensaje = $("#mensaje").val().trim();

        let contenedor = $("#mensajeEstado");
        contenedor.html(""); // limpiar mensajes previos

        // Validación nombre
        if(nombre === ""){
            contenedor.html(`
                <div class="alert alert-danger">El nombre es obligatorio</div>
            `);
            return;
        }

        // Validación email
        let regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(!regexEmail.test(email)){
            contenedor.html(`
                <div class="alert alert-danger">Ingrese un correo válido</div>
            `);
            return;
        }

        // Validación mensaje
        if(mensaje.length < 10){
            contenedor.html(`
                <div class="alert alert-danger">El mensaje debe tener al menos 10 caracteres</div>
            `);
            return;
        }

        // Éxito
        contenedor.html(`
            <div class="alert alert-success">
                Mensaje enviado correctamente :)
            </div>
        `);

        $(".contact-form")[0].reset();
    });

});
</script>

</body>

</html>
